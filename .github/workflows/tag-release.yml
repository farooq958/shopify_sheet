# On every push to master, if pubspec.yaml has a version that is not yet on
# pub.dev, create (or recreate) and push tag vX.Y.Z.
# That tag push triggers publish.yml (OIDC → pub.dev).
#
# Required repo secret:
#   RELEASE_TOKEN = fine-grained PAT with Contents: Read & Write
#                   on farooq958/shopify_sheet
#
# Tags pushed with the default GITHUB_TOKEN do not start other workflows.

name: Tag release on master

on:
  push:
    branches:
      - master

concurrency:
  group: tag-release-master
  cancel-in-progress: false

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Require RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::Add repo secret RELEASE_TOKEN (PAT with Contents: Read and write). Without it, tag pushes will not trigger publish.yml."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Read version from pubspec.yaml
        id: meta
        run: |
          VERSION="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | tr -d '"' | tr -d "'")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Skip if already on pub.dev
        id: pub
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          CODE="$(curl -s -o /dev/null -w '%{http_code}' \
            "https://pub.dev/api/packages/shopify_sheet/versions/${VERSION}")"
          if [ "$CODE" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is already on pub.dev — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} is not on pub.dev yet (HTTP ${CODE})."
          fi

      - name: Require CHANGELOG entry
        if: steps.pub.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -qE "^##[[:space:]]*${VERSION}([[:space:]]|$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## ${VERSION}' heading — add it before releasing."
            exit 1
          fi

      - name: Create or recreate and push tag
        if: steps.pub.outputs.exists == 'false'
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Remove stale tag from an earlier GITHUB_TOKEN push that never published.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists but version is not on pub.dev — recreating."
            git push origin ":refs/tags/${TAG}"
            git tag -d "$TAG" 2>/dev/null || true
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed ${TAG} (should trigger publish.yml)."
